# 多智能体实验配置

## 实验参数

```yaml
experiment:
  name: "multi-agent-validation-2026-03"
  version: "1.0.0"

# 实验场景定义
scenarios:
  simple_feature:
    name: "简单功能开发"
    description: "添加一个新的 CloudPSS API 封装方法"
    complexity: low
    expected:
      single_agent:
        duration_minutes: [5, 10]
        steps: [4, 6]
      multi_agent:
        duration_minutes: [3, 5]
        parallel_steps: 2

  module_refactor:
    name: "模块重构"
    description: "重构结果提取模块，增加异常处理"
    complexity: medium
    expected:
      single_agent:
        duration_minutes: [15, 20]
        steps: [8, 12]
      multi_agent:
        duration_minutes: [8, 12]
        parallel_steps: 3

  new_module:
    name: "新功能开发"
    description: "实现电力系统稳定性分析模块"
    complexity: high
    expected:
      single_agent:
        duration_minutes: [45, 60]
        steps: [20, 30]
      multi_agent:
        duration_minutes: [25, 35]
        parallel_steps: 4

# Agent 角色定义
roles:
  pi:
    name: "Principal Investigator"
    responsibilities:
      - resource_coordination
      - key_decisions
      - project_management
    activation_trigger: "high_complexity OR conflict_detected"

  scientist:
    name: "Scientist"
    responsibilities:
      - theoretical_research
      - method_innovation
      - model_design
    activation_trigger: "research_required OR design_phase"

  researcher:
    name: "Researcher"
    responsibilities:
      - literature_research
      - analysis_design
      - feasibility_study
    activation_trigger: "analysis_required"

  engineer:
    name: "Engineer"
    responsibilities:
      - code_implementation
      - module_development
      - testing_verification
    activation_trigger: "implementation_phase"

# 数据收集配置
data_collection:
  auto_collect: true
  interval_seconds: 30
  events:
    - task_create
    - task_complete
    - tool_call
    - agent_spawn
    - conflict_detected
    - conflict_resolved

# MCP 服务器使用统计
mcp_tracking:
  enabled: true
  servers:
    - context7
    - magic
    - playwright
    - sequential
    - serena
    - tavily

# 质量门控
quality_gates:
  code_review:
    enabled: true
    min_score: 3
  test_coverage:
    enabled: true
    min_pass_rate: 0.8
  solid_compliance:
    enabled: true
    check_levels:
      - SRP
      - OCP
      - LSP
      - ISP
      - DIP

# 报告生成
reporting:
  auto_generate: true
  formats:
    - markdown
    - json
  sections:
    - executive_summary
    - methodology
    - data_analysis
    - conclusions
    - recommendations
```

## 实验执行流程

```
1. 初始化阶段
   ├── 加载配置
   ├── 初始化数据收集器
   └── 记录基线时间戳

2. 任务执行阶段
   ├── 单 Agent 模式 (对照组)
   │   ├── 顺序执行所有步骤
   │   ├── 记录每个事件
   │   └── 生成基线报告
   ├── 多 Agent 模式 (实验组)
   │   ├── 并行分解任务
   │   ├── 多 Agent 协作
   │   └── 生成实验报告

3. 分析阶段
   ├── 数据汇总
   ├── 统计对比
   └── 生成结论

4. 验证阶段
   ├── 交叉验证结果
   ├── 敏感性分析
   └── 最终报告
```

## 成功标准

| 指标 | 目标改进 | 测量方法 |
|------|----------|----------|
| 开发效率 | +40% 时间减少 | 持续时间对比 |
| 代码质量 | +20% 评分提升 | 代码审查对比 |
| 缺陷密度 | -30% Bug 减少 | 测试报告对比 |
| 知识复用 | +50% 模式复用 | 代码相似度分析 |
